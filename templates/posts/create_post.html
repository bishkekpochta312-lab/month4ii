{% extends 'base.html'%}

{% block content %}

<form method="post" enctype="multipart/form-data">
    {% csrf_token%}
      {% if form.errors %}
        <div class="alert alert-danger">
            {% for field in form %}
                {% for error in field.errors %}
                    <p class="mb-0">{{ error }}</p>
                {% endfor %}
            {% endfor %}
            {% for error in form.non_field_errors %}
                <p class="mb-0">{{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}

    {{ form.as_p }}
    <button type="submit">Создать пост</button>
</form>

{% endblock %}
